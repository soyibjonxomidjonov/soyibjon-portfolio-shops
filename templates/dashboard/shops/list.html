{% extends "dashboard/base.html" %}

{% block content %}
<div style="background: #0a0b10; min-height: 100vh; padding: 40px; color: #ffffff; font-family: 'Inter', sans-serif;">

    <div style="max-width: 1200px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h1 style="margin: 0; font-size: 32px; font-weight: 800; color: #ffffff;">
                <span style="color: #00d1ff;">🏪</span> Mening do'konlarim
            </h1>
            <a href="#" style="text-decoration: none; background: #00d1ff; color: #0a0b10; padding: 12px 25px; border-radius: 12px; font-weight: 800; font-size: 14px; transition: 0.3s;">
                <i class="fas fa-plus"></i> YANGI DO'KON
            </a>
        </div>

        <div style="background: #161b22; border-radius: 20px; border: 1px solid #30363d; overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="background: rgba(48, 54, 61, 0.5); border-bottom: 1px solid #30363d;">
                        <th style="padding: 20px; color: #8b949e; font-size: 11px; font-weight: 700; text-transform: uppercase;">Do'kon</th>
                        <th style="padding: 20px; color: #8b949e; font-size: 11px; font-weight: 700; text-transform: uppercase;">Manzil</th>
                        <th style="padding: 20px; color: #8b949e; font-size: 11px; font-weight: 700; text-transform: uppercase;">Sana</th>
                        <th style="padding: 20px; color: #8b949e; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: right;">Amallar</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in shops %}
                    <tr style="border-bottom: 1px solid #21262d; transition: 0.3s;" onmouseover="this.style.background='rgba(0, 209, 255, 0.02)'" onmouseout="this.style.background='transparent'">
                        <td style="padding: 20px;">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div style="width: 45px; height: 45px; background: #0d1117; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d;">
                                    <span style="font-size: 20px;">🏬</span>
                                </div>
                                <div>
                                    <div style="font-weight: 700; color: #ffffff; font-size: 16px;">{{ s.name }}</div>
                                    <div style="font-size: 12px; color: #8b949e;">ID: #{{ s.id }}</div>
                                </div>
                            </div>
                        </td>
                        <td style="padding: 20px; color: #c9d1d9; font-size: 14px;">
                            {{ s.address|truncatechars:30|default:"Manzil yo'q" }}
                        </td>
                        <td style="padding: 20px; color: #00ffaa; font-weight: 600; font-size: 14px;">
                            {{ s.created_at|date:"d.m.Y" }}
                        </td>
                        <td style="padding: 20px; text-align: right;">
                            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                                <a href="{% url 'shops_id' s.id %}" style="text-decoration: none; background: rgba(0, 209, 255, 0.1); color: #00d1ff; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; border: 1px solid rgba(0, 209, 255, 0.2); transition: 0.3s;">
                                    <i class="fas fa-edit"></i> Sozlash
                                </a>
                                <button style="background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 73, 0.2); padding: 8px 12px; border-radius: 8px; cursor: pointer;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
