<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f8f9fa; }

        /* Sidebar - Chap taraf doimiy turadi */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            position: fixed;
            padding: 20px 10px;
        }

        .sidebar-brand {
            padding: 10px 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu { list-style: none; }
        .nav-item { margin-bottom: 5px; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            text-decoration: none;
            color: #5f6368;
            border-radius: 10px;
            transition: 0.3s;
            gap: 15px;
        }

        .nav-link:hover, .nav-link.active {
            background-color: #f0f2ff;
            color: #4e73df;
        }

        .nav-link i { font-size: 18px; width: 25px; text-align: center; }

        /* Main Content - O'ng taraf o'zgaruvchan */
        .main-container {
            margin-left: 260px;
            width: calc(100% - 260px);
            min-height: 100vh;
            padding: 30px;
        }

        /* Rasmda ko'ringan gradient kartochkalar */
        .header-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-layer-group" style="color: #4e73df;"></i>
        <span>Admin Panel</span>
    </div>
<ul class="nav-menu">
    <li class="nav-item">
        <a href="{% url 'dashboard_home' %}" class="nav-link">
            <i class="fas fa-chart-line"></i> Boshqaruv paneli
        </a>
    </li>

    <li class="nav-item">
        <a href="{% url 'dashboard_home' %}" class="nav-link">
            <i class="fas fa-store"></i> Do'konlar
        </a>
    </li>

    <li class="nav-item">
        <a href="#" class="nav-link">
            <i class="fas fa-box"></i> Mahsulotlar
        </a>
    </li>

    <li class="nav-item">
        <a href="#" class="nav-link">
            <i class="fas fa-shopping-cart"></i> Buyurtmalar
        </a>
    </li>
</ul>
</div>

<div class="main-container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
