<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard | Cyber Shop{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ASOSIY QORA FON VA NEON STIL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            display: flex;
            background-color: #0d1117; /* To'q qora fon */
            color: #ffffff;
            min-height: 100vh;
        }

        /* Sidebar - Cyber Style */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #0a0b10;
            border-right: 1px solid #30363d;
            position: fixed;
            padding: 25px 15px;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 10px 15px;
            font-size: 20px;
            font-weight: 800;
            color: #00d1ff; /* Neon ko'k */
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 209, 255, 0.3);
        }

        .nav-menu { list-style: none; }
        .nav-item { margin-bottom: 8px; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            text-decoration: none;
            color: #8b949e; /* Kulrang matn */
            border-radius: 12px;
            transition: all 0.3s ease;
            gap: 15px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        /* Aktiv bo'lim va Hover holati */
        .nav-link:hover {
            background: rgba(48, 54, 61, 0.5);
            color: #ffffff;
            border-color: #30363d;
        }

        .nav-link.active {
            background-color: rgba(0, 209, 255, 0.1);
            color: #00d1ff;
            border-color: rgba(0, 209, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 209, 255, 0.1);
        }

        .nav-link i {
            font-size: 18px;
            width: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .nav-link.active i {
            color: #00d1ff;
        }

        /* Main Content Wrapper */
        .main-container {
            margin-left: 260px;
            width: calc(100% - 260px);
            min-height: 100vh;
            background: #0d1117;
            padding: 40px;
            position: relative;
        }

        /* Neon chiziq yuqorida (bezak uchun) */
        .main-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #00d1ff, #00ffaa);
            opacity: 0.5;
        }

        /* Skayp effektli kartochkalar uchun global stil */
        .cyber-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            transition: 0.3s;
        }

        .cyber-card:hover {
            border-color: #4e73df;
            box-shadow: 0 0 20px rgba(78, 115, 223, 0.1);
        }

        /* Skrollbar stili */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0b10; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-cube"></i>
        <span>Admin Panel</span>
    </div>
    <ul class="nav-menu">
        <li class="nav-item">
            <a href="{% url 'dashboard_home' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard_home' %}active{% endif %}">
                <i class="fas fa-th-large"></i> Boshqaruv paneli
            </a>
        </li>

        <li class="nav-item">
            <a href="{% url 'shops' %}" class="nav-link {% if 'shop' in request.path %}active{% endif %}">
                <i class="fas fa-store"></i> Do'konlar
            </a>
        </li>

        <li class="nav-item">
            <a href="{% url 'products' %}" class="nav-link {% if 'product' in request.path %}active{% endif %}">
                <i class="fas fa-box-open"></i> Mahsulotlar
            </a>
        </li>

        <li class="nav-item">
            <a href="{% url 'orders' %}" class="nav-link {% if 'order' in request.path %}active{% endif %}">
                <i class="fas fa-receipt"></i> Buyurtmalar
            </a>
        </li>
    </ul>

    <div style="position: absolute; bottom: 30px; width: calc(100% - 30px);">
        <a href="{% url 'logout_page' %}" style="text-decoration: none; color: #8b949e; font-size: 13px; display: flex; align-items: center; gap: 10px; padding: 10px;">
            <i class="fas fa-sign-out-alt"></i> Hisobdan chiqish
        </a>
    </div>
</div>

<div class="main-container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
